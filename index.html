<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>GBP/JPY · Nexus</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:       #0f1117;
    --surface:  #181c27;
    --surface2: #1e2334;
    --border:   rgba(255,255,255,0.07);
    --text:     #e2e8f0;
    --muted:    #64748b;
    --green:    #34d399;
    --red:      #f87171;
    --blue:     #60a5fa;
    --warn:     #fbbf24;
    --radius:   12px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
    font-size: 15px;
    line-height: 1.5;
  }

  /* ── HEADER ── */
  .header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 18px 20px 14px;
    border-bottom: 1px solid var(--border);
  }
  .header-left h1 {
    font-size: 20px;
    font-weight: 600;
    letter-spacing: 0.5px;
    color: var(--text);
  }
  .header-left span {
    font-size: 12px;
    color: var(--muted);
    font-weight: 400;
  }
  .live-pill {
    display: flex;
    align-items: center;
    gap: 6px;
    background: rgba(52,211,153,0.1);
    border: 1px solid rgba(52,211,153,0.2);
    border-radius: 20px;
    padding: 5px 12px;
    font-size: 12px;
    font-weight: 500;
    color: var(--green);
  }
  .live-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--green);
    animation: blink 2s infinite;
  }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

  /* ── PRICE BLOCK ── */
  .price-block {
    padding: 28px 20px 20px;
    text-align: center;
  }
  .price-label {
    font-size: 12px;
    color: var(--muted);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 10px;
  }
  .price-main {
    font-family: 'JetBrains Mono', monospace;
    font-size: clamp(40px, 14vw, 64px);
    font-weight: 600;
    color: var(--text);
    letter-spacing: -1px;
    transition: color 0.3s;
  }
  .price-main.up   { color: var(--green); }
  .price-main.down { color: var(--red);   }

  .price-change {
    font-family: 'JetBrains Mono', monospace;
    font-size: 14px;
    margin-top: 6px;
    color: var(--muted);
  }
  .price-change.up   { color: var(--green); }
  .price-change.down { color: var(--red);   }

  .spark-wrap {
    margin: 16px auto 0;
    max-width: 340px;
    height: 44px;
  }
  #sparkCanvas { width: 100%; height: 100%; }

  /* ── SIGNAL CARD ── */
  .signal-card {
    margin: 0 16px 16px;
    border-radius: var(--radius);
    padding: 16px;
    border: 1px solid var(--border);
    background: var(--surface);
    display: flex;
    align-items: center;
    gap: 14px;
    transition: all 0.35s ease;
  }
  .signal-card.buy {
    background: rgba(52,211,153,0.07);
    border-color: rgba(52,211,153,0.3);
  }
  .signal-card.sell {
    background: rgba(248,113,113,0.07);
    border-color: rgba(248,113,113,0.3);
  }
  .signal-emoji { font-size: 26px; flex-shrink: 0; }
  .signal-info h3 {
    font-size: 14px;
    font-weight: 600;
    color: var(--text);
  }
  .signal-info p {
    font-size: 12px;
    color: var(--muted);
    margin-top: 2px;
  }
  .signal-card.buy  .signal-info h3 { color: var(--green); }
  .signal-card.sell .signal-info h3 { color: var(--red);   }

  /* ── LEVELS GRID ── */
  .section {
    padding: 0 16px 16px;
  }
  .section-label {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 10px;
    padding: 0 4px;
  }
  .levels-grid {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 8px;
  }
  .level-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 12px 10px;
    text-align: center;
    transition: border-color 0.3s;
  }
  .level-card.alert-sell { border-color: rgba(248,113,113,0.4); }
  .level-card.alert-buy  { border-color: rgba(52,211,153,0.4);  }

  .level-period {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 10px;
  }
  .level-row {
    margin-bottom: 8px;
  }
  .level-tag {
    font-size: 10px;
    color: var(--muted);
    margin-bottom: 3px;
  }
  .level-val {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    font-weight: 600;
  }
  .level-val.high { color: var(--red);   }
  .level-val.low  { color: var(--green); }

  .pip-bar-wrap {
    height: 3px;
    background: rgba(255,255,255,0.06);
    border-radius: 2px;
    margin-top: 6px;
    overflow: hidden;
  }
  .pip-bar {
    height: 100%;
    border-radius: 2px;
    transition: width 0.8s ease;
  }
  .pip-bar.high { background: var(--red);   }
  .pip-bar.low  { background: var(--green); }

  .pip-distance {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    margin-top: 4px;
    color: var(--muted);
  }
  .pip-distance.near     { color: var(--warn);  }
  .pip-distance.exceeded { color: var(--red);   }
  .pip-distance.exceeded-buy { color: var(--green); }

  /* ── NEWS ── */
  .news-list {
    display: flex;
    flex-direction: column;
    gap: 8px;
    max-height: 240px;
    overflow-y: auto;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }
  .news-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 12px 14px;
  }
  .news-item h4 {
    font-size: 13px;
    font-weight: 500;
    color: var(--text);
    line-height: 1.4;
  }
  .news-meta {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 6px;
  }
  .news-time {
    font-size: 11px;
    color: var(--muted);
  }
  .impact-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .impact-dot.high   { background: var(--red);   }
  .impact-dot.medium { background: var(--warn);  }
  .impact-dot.low    { background: var(--green); }

  /* ── STATUS ── */
  .status-bar {
    padding: 12px 20px 24px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .status-text {
    font-size: 11px;
    color: var(--muted);
  }
  .countdown-wrap {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .countdown-ring {
    width: 28px; height: 28px;
    flex-shrink: 0;
  }
  .countdown-ring circle {
    fill: none;
    stroke: var(--border);
    stroke-width: 3;
  }
  .countdown-ring .ring-fill {
    fill: none;
    stroke: var(--blue);
    stroke-width: 3;
    stroke-linecap: round;
    stroke-dasharray: 66;
    stroke-dashoffset: 0;
    transform: rotate(-90deg);
    transform-origin: 50% 50%;
    transition: stroke-dashoffset 1s linear;
  }
  .countdown-num {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--muted);
  }

  /* ── TOAST ── */
  .toast-wrap {
    position: fixed;
    top: 16px; left: 50%;
    transform: translateX(-50%);
    width: calc(100% - 32px);
    max-width: 400px;
    z-index: 999;
    display: flex;
    flex-direction: column;
    gap: 8px;
    pointer-events: none;
  }
  .toast {
    border-radius: var(--radius);
    padding: 14px 16px;
    border: 1px solid;
    backdrop-filter: blur(20px);
    display: flex;
    align-items: flex-start;
    gap: 12px;
    pointer-events: all;
    animation: slideDown 0.4s cubic-bezier(0.34,1.56,0.64,1);
  }
  @keyframes slideDown {
    from { opacity:0; transform:translateY(-12px) scale(0.96); }
    to   { opacity:1; transform:translateY(0)    scale(1);    }
  }
  .toast.buy  { background: rgba(15,17,23,0.95); border-color: rgba(52,211,153,0.4);  }
  .toast.sell { background: rgba(15,17,23,0.95); border-color: rgba(248,113,113,0.4); }
  .toast-icon { font-size: 22px; flex-shrink: 0; }
  .toast-body h4 {
    font-size: 13px;
    font-weight: 600;
  }
  .toast.buy  .toast-body h4 { color: var(--green); }
  .toast.sell .toast-body h4 { color: var(--red);   }
  .toast-body p {
    font-size: 12px;
    color: var(--muted);
    margin-top: 2px;
    line-height: 1.4;
  }
  .toast-close {
    margin-left: auto;
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-size: 16px;
    padding: 0;
    flex-shrink: 0;
  }

  /* ── DIVIDER ── */
  .divider {
    height: 1px;
    background: var(--border);
    margin: 4px 16px 16px;
  }

  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
</style>
</head>
<body>

<div class="toast-wrap" id="toastWrap"></div>

<!-- HEADER -->
<div class="header">
  <div class="header-left">
    <h1>GBP / JPY</h1>
    <span id="clockEl">-- UTC</span>
  </div>
  <div class="live-pill"><div class="live-dot"></div> EN VIVO</div>
</div>

<!-- PRECIO -->
<div class="price-block">
  <div class="price-label">Precio actual</div>
  <div class="price-main" id="mainPrice">----.---</div>
  <div class="price-change" id="changeEl">+0.000 (0.00%)</div>
  <div class="spark-wrap">
    <canvas id="sparkCanvas" width="340" height="44"></canvas>
  </div>
</div>

<!-- SEÑAL -->
<div class="signal-card neutral" id="signalCard">
  <div class="signal-emoji" id="signalEmoji">🔍</div>
  <div class="signal-info">
    <h3 id="signalTitle">Monitoreando</h3>
    <p id="signalBody">Sin señal activa. Umbral: 22 pips</p>
  </div>
</div>

<!-- NIVELES -->
<div class="section">
  <div class="section-label">Niveles H/L + 22 pips</div>
  <div class="levels-grid">

    <div class="level-card" id="cardD">
      <div class="level-period">Diario</div>
      <div class="level-row">
        <div class="level-tag">Máx</div>
        <div class="level-val high" id="hlDH">---</div>
        <div class="pip-bar-wrap"><div class="pip-bar high" id="barDH" style="width:0%"></div></div>
        <div class="pip-distance" id="pipDH">-- pip</div>
      </div>
      <div class="level-row">
        <div class="level-tag">Mín</div>
        <div class="level-val low" id="hlDL">---</div>
        <div class="pip-bar-wrap"><div class="pip-bar low" id="barDL" style="width:0%"></div></div>
        <div class="pip-distance" id="pipDL">-- pip</div>
      </div>
    </div>

    <div class="level-card" id="cardW">
      <div class="level-period">Semanal</div>
      <div class="level-row">
        <div class="level-tag">Máx</div>
        <div class="level-val high" id="hlWH">---</div>
        <div class="pip-bar-wrap"><div class="pip-bar high" id="barWH" style="width:0%"></div></div>
        <div class="pip-distance" id="pipWH">-- pip</div>
      </div>
      <div class="level-row">
        <div class="level-tag">Mín</div>
        <div class="level-val low" id="hlWL">---</div>
        <div class="pip-bar-wrap"><div class="pip-bar low" id="barWL" style="width:0%"></div></div>
        <div class="pip-distance" id="pipWL">-- pip</div>
      </div>
    </div>

    <div class="level-card" id="cardM">
      <div class="level-period">Mensual</div>
      <div class="level-row">
        <div class="level-tag">Máx</div>
        <div class="level-val high" id="hlMH">---</div>
        <div class="pip-bar-wrap"><div class="pip-bar high" id="barMH" style="width:0%"></div></div>
        <div class="pip-distance" id="pipMH">-- pip</div>
      </div>
      <div class="level-row">
        <div class="level-tag">Mín</div>
        <div class="level-val low" id="hlML">---</div>
        <div class="pip-bar-wrap"><div class="pip-bar low" id="barML" style="width:0%"></div></div>
        <div class="pip-distance" id="pipML">-- pip</div>
      </div>
    </div>

  </div>
</div>

<!-- NOTICIAS -->
<div class="divider"></div>
<div class="section">
  <div class="section-label">Noticias Forex</div>
  <div class="news-list" id="newsList"></div>
</div>

<!-- STATUS -->
<div class="status-bar">
  <div class="status-text" id="lastUpdate">Actualizando...</div>
  <div class="countdown-wrap">
    <svg class="countdown-ring" viewBox="0 0 24 24">
      <circle cx="12" cy="12" r="10.5"/>
      <circle cx="12" cy="12" r="10.5" class="ring-fill" id="ringFill"/>
    </svg>
    <span class="countdown-num" id="countNum">10s</span>
  </div>
</div>

<script>
// ── CONFIG ──
const PIP       = 0.01;
const THRESHOLD = 22;
const REFRESH   = 10000;

let currentPrice = 0;
let openPrice    = 0;
let priceHistory = [];
let lastAlert    = null;
let countdown    = 10;
let cdInterval   = null;

// ── CLOCK ──
function tick() {
  const n = new Date();
  const pad = v => String(v).padStart(2,'0');
  document.getElementById('clockEl').textContent =
    `${pad(n.getUTCHours())}:${pad(n.getUTCMinutes())}:${pad(n.getUTCSeconds())} UTC`;
}
setInterval(tick, 1000); tick();

// ── SOUND ──
function beep(type) {
  try {
    const ac = new (window.AudioContext||window.webkitAudioContext)();
    const o  = ac.createOscillator();
    const g  = ac.createGain();
    o.connect(g); g.connect(ac.destination);
    o.frequency.value = type === 'buy' ? 740 : 370;
    o.type = 'sine';
    g.gain.setValueAtTime(0.12, ac.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.35);
    o.start(); o.stop(ac.currentTime + 0.35);
  } catch(e){}
}

// ── TOAST ──
function toast(type, title, msg) {
  const w = document.getElementById('toastWrap');
  const d = document.createElement('div');
  d.className = `toast ${type}`;
  d.innerHTML = `
    <div class="toast-icon">${type==='buy'?'📈':'📉'}</div>
    <div class="toast-body"><h4>${title}</h4><p>${msg}</p></div>
    <button class="toast-close" onclick="this.parentElement.remove()">×</button>`;
  w.appendChild(d);
  beep(type);
  if (navigator.vibrate) navigator.vibrate(type==='buy'?[80,40,80]:[160,40,160,40,160]);
  setTimeout(() => d.remove && d.remove(), 9000);
}

// ── SPARKLINE ──
function drawSpark() {
  const canvas = document.getElementById('sparkCanvas');
  const ctx    = canvas.getContext('2d');
  const W = canvas.parentElement.offsetWidth;
  canvas.width = W;
  ctx.clearRect(0, 0, W, 44);
  if (priceHistory.length < 2) return;
  const d   = priceHistory.slice(-80);
  const min = Math.min(...d);
  const max = Math.max(...d);
  const r   = max - min || 0.01;
  const pts = d.map((v,i) => ({
    x: (i / (d.length-1)) * W,
    y: 44 - ((v-min)/r) * 36 - 4
  }));
  const up = d[d.length-1] >= d[0];
  const col = up ? '52,211,153' : '248,113,113';
  const grad = ctx.createLinearGradient(0,0,0,44);
  grad.addColorStop(0, `rgba(${col},0.25)`);
  grad.addColorStop(1, `rgba(${col},0)`);
  ctx.beginPath();
  ctx.moveTo(pts[0].x, 44);
  pts.forEach(p => ctx.lineTo(p.x, p.y));
  ctx.lineTo(pts[pts.length-1].x, 44);
  ctx.closePath();
  ctx.fillStyle = grad;
  ctx.fill();
  ctx.beginPath();
  pts.forEach((p,i) => i===0 ? ctx.moveTo(p.x,p.y) : ctx.lineTo(p.x,p.y));
  ctx.strokeStyle = `rgba(${col},0.85)`;
  ctx.lineWidth = 1.5;
  ctx.stroke();
}

// ── PRICE DISPLAY ──
function displayPrice(price, prev) {
  const el = document.getElementById('mainPrice');
  el.textContent = price.toFixed(3);
  el.className   = 'price-main' + (price > prev ? ' up' : price < prev ? ' down' : '');
  const chg = price - openPrice;
  const pct = openPrice > 0 ? (chg/openPrice*100) : 0;
  const ce  = document.getElementById('changeEl');
  ce.textContent = `${chg>=0?'+':''}${chg.toFixed(3)}  (${pct>=0?'+':''}${pct.toFixed(2)}%)`;
  ce.className   = 'price-change' + (chg>=0?' up':' down');
}

// ── PIP METERS ──
function pipDist(price, level) { return Math.abs((price - level) / PIP); }

function updateMeters(price, lv) {
  const MAX = THRESHOLD + 8;
  function set(hlId, barId, pipId, pips, type) {
    document.getElementById(hlId).textContent; // already set
    const bar = document.getElementById(barId);
    bar.style.width = Math.min(100, (pips/MAX)*100) + '%';
    const pe = document.getElementById(pipId);
    pe.textContent = pips > 999 ? '---' : pips.toFixed(1) + ' pip';
    pe.className = 'pip-distance';
    if (pips >= THRESHOLD) pe.classList.add(type==='h'?'exceeded':'exceeded-buy');
    else if (pips >= THRESHOLD*0.75) pe.classList.add('near');
  }
  // distances to the +22 pip target line
  set('hlDH','barDH','pipDH', pipDist(price, lv.daily.high  + THRESHOLD*PIP), 'h');
  set('hlDL','barDL','pipDL', pipDist(price, lv.daily.low   - THRESHOLD*PIP), 'l');
  set('hlWH','barWH','pipWH', pipDist(price, lv.weekly.high + THRESHOLD*PIP), 'h');
  set('hlWL','barWL','pipWL', pipDist(price, lv.weekly.low  - THRESHOLD*PIP), 'l');
  set('hlMH','barMH','pipMH', pipDist(price, lv.monthly.high+ THRESHOLD*PIP), 'h');
  set('hlML','barML','pipML', pipDist(price, lv.monthly.low - THRESHOLD*PIP), 'l');
}

// ── HL DISPLAY ──
let levels = { daily:{high:0,low:0}, weekly:{high:0,low:0}, monthly:{high:0,low:0} };

function displayLevels(lv) {
  document.getElementById('hlDH').textContent = lv.daily.high.toFixed(3);
  document.getElementById('hlDL').textContent = lv.daily.low.toFixed(3);
  document.getElementById('hlWH').textContent = lv.weekly.high.toFixed(3);
  document.getElementById('hlWL').textContent = lv.weekly.low.toFixed(3);
  document.getElementById('hlMH').textContent = lv.monthly.high.toFixed(3);
  document.getElementById('hlML').textContent = lv.monthly.low.toFixed(3);
}

// ── SIGNAL ──
function checkSignal(price, lv) {
  const card  = document.getElementById('signalCard');
  const emoji = document.getElementById('signalEmoji');
  const title = document.getElementById('signalTitle');
  const body  = document.getElementById('signalBody');
  let sig = null, where = '';
  const periods = ['daily','weekly','monthly'];
  const names   = {daily:'Diario', weekly:'Semanal', monthly:'Mensual'};

  for (const p of periods) {
    if (price > lv[p].high + THRESHOLD*PIP) { sig='sell'; where=names[p]; break; }
  }
  if (!sig) {
    for (const p of periods) {
      if (price < lv[p].low - THRESHOLD*PIP) { sig='buy'; where=names[p]; break; }
    }
  }

  ['buy','sell','neutral'].forEach(c => card.classList.remove(c));

  if (sig === 'sell') {
    card.classList.add('sell');
    emoji.textContent = '📉';
    title.textContent = 'Posible VENTA';
    body.textContent  = `Superó máx. ${where} en +22 pips`;
    if (lastAlert !== 'sell') {
      toast('sell','Señal de venta',`GBP/JPY rompió el máximo ${where} en +22 pips. Probable reversión bajista.`);
      lastAlert = 'sell';
    }
  } else if (sig === 'buy') {
    card.classList.add('buy');
    emoji.textContent = '📈';
    title.textContent = 'Posible COMPRA';
    body.textContent  = `Rompió mín. ${where} en −22 pips`;
    if (lastAlert !== 'buy') {
      toast('buy','Señal de compra',`GBP/JPY rompió el mínimo ${where} en −22 pips. Probable reversión alcista.`);
      lastAlert = 'buy';
    }
  } else {
    card.classList.add('neutral');
    emoji.textContent = '🔍';
    title.textContent = 'Monitoreando';
    body.textContent  = 'Sin señal activa. Umbral: 22 pips';
    lastAlert = null;
  }
}

// ── FETCH ──
async function fetchPrice() {
  const urls = [
    'https://query1.finance.yahoo.com/v8/finance/chart/GBPJPY=X?interval=1m&range=1d',
    'https://query2.finance.yahoo.com/v8/finance/chart/GBPJPY=X?interval=1m&range=1d'
  ];
  for (const url of urls) {
    try {
      const r    = await fetch(url);
      if (!r.ok) continue;
      const data = await r.json();
      const res  = data?.chart?.result?.[0];
      if (!res) continue;
      const m      = res.meta;
      const closes = res.indicators?.quote?.[0]?.close?.filter(Boolean) || [];
      return { price:m.regularMarketPrice, open:m.chartPreviousClose||m.regularMarketOpen,
               dHigh:m.regularMarketDayHigh, dLow:m.regularMarketDayLow, closes };
    } catch(e) { continue; }
  }
  return null;
}

function simulate() {
  if (!currentPrice) currentPrice = 193.5 + (Math.random()-0.5)*4;
  currentPrice = Math.max(186, Math.min(204, currentPrice + (Math.random()-0.48)*0.07));
  return currentPrice;
}

async function refresh() {
  const prev = currentPrice;
  const data = await fetchPrice();

  if (data?.price) {
    currentPrice = data.price;
    if (!openPrice) openPrice = data.open || data.price;
    if (!levels.daily.high) {
      const dH = data.dHigh || data.price*1.002;
      const dL = data.dLow  || data.price*0.998;
      levels = {
        daily:   { high:dH,            low:dL            },
        weekly:  { high:dH*1.003,      low:dL*0.997      },
        monthly: { high:dH*1.008,      low:dL*0.992      },
      };
    }
    priceHistory = data.closes.slice(-100);
    if (!priceHistory.length) priceHistory.push(currentPrice);
  } else {
    currentPrice = simulate();
    if (!openPrice) openPrice = currentPrice;
    if (!levels.daily.high) {
      levels = {
        daily:   { high:currentPrice+0.28, low:currentPrice-0.28 },
        weekly:  { high:currentPrice+0.75, low:currentPrice-0.75 },
        monthly: { high:currentPrice+1.90, low:currentPrice-1.90 },
      };
    }
    priceHistory.push(currentPrice);
    if (priceHistory.length > 100) priceHistory.shift();
  }

  displayPrice(currentPrice, prev);
  displayLevels(levels);
  updateMeters(currentPrice, levels);
  checkSignal(currentPrice, levels);
  drawSpark();

  const n = new Date();
  const pad = v => String(v).padStart(2,'0');
  document.getElementById('lastUpdate').textContent =
    `Actualizado ${pad(n.getUTCHours())}:${pad(n.getUTCMinutes())}:${pad(n.getUTCSeconds())} UTC`;
}

// ── COUNTDOWN RING ──
function startCountdown() {
  if (cdInterval) clearInterval(cdInterval);
  countdown = REFRESH / 1000;
  const ring = document.getElementById('ringFill');
  const num  = document.getElementById('countNum');
  const circ = 66;
  cdInterval = setInterval(() => {
    countdown = Math.max(0, countdown - 1);
    const offset = circ - (countdown / (REFRESH/1000)) * circ;
    ring.style.strokeDashoffset = offset;
    num.textContent = countdown + 's';
  }, 1000);
}

// ── NEWS ──
const NEWS = [
  { time:'3min',  h:'BoJ mantiene tasas; el JPY reacciona con volatilidad', impact:'high',   src:'Reuters' },
  { time:'18min', h:'UK GDP Q4 final: +0.1% vs +0.0% esperado, GBP al alza', impact:'high',  src:'ONS'     },
  { time:'45min', h:'IPC UK anual en 2.8%, ligeramente por encima del consenso', impact:'high', src:'ONS'  },
  { time:'1h',    h:'Fed minutes confirman cautela; dólar gana terreno moderadamente', impact:'medium', src:'FOMC' },
  { time:'2h',    h:'NFP EEUU supera expectativas, risk-off en JPY', impact:'high', src:'BLS' },
  { time:'3h',    h:'PMI servicios UK: 54.2 vs 53.0 previsto', impact:'medium', src:'S&P Global' },
  { time:'5h',    h:'Cuenta corriente Japón: superávit menor al esperado', impact:'medium', src:'BOJ' },
  { time:'8h',    h:'Ventas minoristas UK +0.3%, mejor que −0.1% previsto', impact:'medium', src:'ONS' },
  { time:'12h',   h:'G7 estudia medidas coordinadas en divisas según fuentes', impact:'low', src:'Bloomberg' },
];

function renderNews() {
  const list = document.getElementById('newsList');
  list.innerHTML = NEWS.map(n => `
    <div class="news-item">
      <h4>${n.h}</h4>
      <div class="news-meta">
        <span class="news-time">hace ${n.time} · ${n.src}</span>
        <div class="impact-dot ${n.impact}"></div>
      </div>
    </div>`).join('');
}

function refreshNews() {
  const fresh = [
    { time:'ahora', h:`GBP/JPY cotiza en ${currentPrice.toFixed(3)}, mercado en compás de espera`, impact:'low', src:'Nexus' },
    { time:'1min',  h:'Flujos institucionales detectados en GBP/JPY zona 192–194', impact:'medium', src:'Reuters' },
    { time:'2min',  h:'Volatilidad implícita GBP/JPY aumenta antes de datos UK', impact:'medium', src:'CBOE' },
  ];
  NEWS.unshift(fresh[Math.floor(Math.random()*fresh.length)]);
  if (NEWS.length > 12) NEWS.pop();
  renderNews();
}

// ── INIT ──
(async () => {
  renderNews();
  await refresh();
  startCountdown();
  setInterval(async () => { await refresh(); startCountdown(); }, REFRESH);
  setInterval(refreshNews, 60000);
})();

window.addEventListener('resize', drawSpark);
</script>
