<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>₿ BTC Quantum Dashboard</title>
    <style>
        /* FUENTES Y VARIABLES */
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Space+Grotesk:wght@400;500;700&display=swap');

        :root {
            --accent: #ff9500;
            --accent-glow: rgba(255, 149, 0, 0.25);
            --bg: #030305;
            --card-bg: rgba(25, 25, 35, 0.7);
            --text-main: #ffffff;
            --text-dim: #94a3b8;
            --border: rgba(255, 255, 255, 0.08);
            --up: #00ff88;
            --down: #ff4444;
        }

        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
        
        body {
            width: 100%; min-height: 100vh;
            background-color: var(--bg);
            background-image: radial-gradient(circle at 0% 0%, rgba(255, 149, 0, 0.12) 0%, transparent 40%);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
        }

        #app { max-width: 480px; margin: 0 auto; padding: 15px; display: flex; flex-direction: column; gap: 18px; padding-bottom: 80px; }

        /* ESTILOS DE CABECERA */
        .header { text-align: left; padding: 25px 0 5px; }
        .logo { font-family: 'Space Grotesk', sans-serif; font-size: 28px; font-weight: 700; display: flex; align-items: center; gap: 10px; }
        .logo span { color: var(--accent); text-shadow: 0 0 20px var(--accent-glow); }
        .logo-sub { font-size: 10px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 3px; margin-top: 4px; font-weight: 600; }

        /* TARJETAS GLASSMORPHISM */
        .card { 
            background: var(--card-bg); 
            backdrop-filter: blur(15px); 
            -webkit-backdrop-filter: blur(15px); 
            border: 1px solid var(--border); 
            border-radius: 28px; 
            padding: 24px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        
        .card-lbl { 
            font-family: 'Space Grotesk', sans-serif; 
            font-size: 11px; 
            font-weight: 600; 
            color: var(--text-dim); 
            text-transform: uppercase; 
            letter-spacing: 2px; 
            margin-bottom: 15px; 
            display: flex; 
            justify-content: space-between; 
        }

        /* PRECIO Y STATS */
        .price-val { font-family: 'Space Grotesk', sans-serif; font-size: 42px; font-weight: 700; letter-spacing: -2px; color: #fff; margin-bottom: 5px;}
        .price-badge { display: inline-flex; padding: 4px 12px; border-radius: 100px; font-size: 13px; font-weight: 700; margin-bottom: 15px;}
        .badge-up { background: rgba(0, 255, 136, 0.1); color: var(--up); border: 1px solid rgba(0, 255, 136, 0.2); }
        .badge-dn { background: rgba(255, 68, 68, 0.1); color: var(--down); border: 1px solid rgba(255, 68, 68, 0.2); }

        .price-stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 20px; }
        .pstat { background: rgba(0,0,0,0.3); padding: 10px; border-radius: 16px; border: 1px solid rgba(255,255,255,0.03); text-align: center; }
        .pstat-val { font-size: 11px; font-weight: 700; color: #f1f5f9; font-family: 'Space Grotesk'; }
        .pstat-lbl { font-size: 8px; color: var(--text-dim); margin-top: 3px; font-weight: 600; }

        /* GRÁFICO */
        #chartWrap { height: 120px; width: 100%; position: relative; margin-top: 10px; }
        #priceChart { width: 100% !important; height: 100% !important; }

        /* SENTIMIENTO */
        .sent-val { font-family: 'Space Grotesk'; font-size: 52px; font-weight: 700; margin-bottom: 5px; color: var(--accent); }
        .sent-bar-bg { height: 8px; background: rgba(255,255,255,0.05); border-radius: 10px; margin: 20px 0; position: relative; overflow: hidden; }
        #sentFill { position: absolute; height: 100%; width: 0%; background: var(--accent); transition: width 1.5s ease-in-out; box-shadow: 0 0 15px var(--accent); }

        /* NOTICIAS */
        .news-item { padding: 16px 0; border-bottom: 1px solid rgba(255,255,255,0.05); cursor: pointer; transition: 0.2s; }
        .news-item:hover { opacity: 0.8; }
        .news-title { font-family: 'Space Grotesk'; font-size: 14px; font-weight: 500; line-height: 1.4; color: #e2e8f0; margin-bottom: 5px; }
        .news-src { font-size: 10px; color: var(--accent); font-weight: 700; text-transform: uppercase; letter-spacing: 1px; }

        /* BOTÓN FLOTANTE */
        .refresh-btn { 
            position: fixed; bottom: 25px; right: 25px; width: 60px; height: 60px; border-radius: 22px; 
            background: var(--accent); color: #000; border: none; font-size: 24px; cursor: pointer; 
            box-shadow: 0 10px 25px rgba(255, 149, 0, 0.4); z-index: 100; transition: transform 0.2s;
        }
        .refresh-btn:active { transform: scale(0.9); }
        .spinning { animation: spin 0.8s ease-in-out; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<button class="refresh-btn" id="refreshBtn" onclick="refreshAll()">⚡</button>

<div id="app">
    <header class="header">
        <div class="logo"><span>₿</span> BTC QUANTUM</div>
        <div class="logo-sub">Intelligence Ecosystem</div>
    </header>

    <div class="card">
        <div class="card-lbl">Spot Price <span id="lastUpdate" style="color:var(--accent)">00:00</span></div>
        <div class="price-val" id="btcPrice">$ --,---.--</div>
        <div class="price-badge" id="priceChange">--%</div>
        <div class="price-stats">
            <div class="pstat"><div class="pstat-val" id="high24">--</div><div class="pstat-lbl">HIGH</div></div>
            <div class="pstat"><div class="pstat-val" id="low24">--</div><div class="pstat-lbl">LOW</div></div>
            <div class="pstat"><div class="pstat-val" id="mktCap">--</div><div class="pstat-lbl">M. CAP</div></div>
        </div>
        <div id="chartWrap"><canvas id="priceChart"></canvas></div>
    </div>

    <div class="card" style="text-align:center">
        <div class="card-lbl">Market Sentiment</div>
        <div class="sent-val" id="gaugeVal">--</div>
        <div id="gaugeLabel" style="font-size:11px; letter-spacing:2px; font-weight:700; color:var(--accent)">ANALYZING NETWORK...</div>
        <div class="sent-bar-bg"><div id="sentFill"></div></div>
        <div id="gaugeDesc" style="font-size:11px; color:var(--text-dim)">Fear & Greed Index sourced from volatility and social trends.</div>
    </div>

    <div class="card">
        <div class="card-lbl">Intelligence Feed</div>
        <div id="newsList">
            <div style="padding:10px; color:var(--text-dim); font-size:12px;">Waiting for data...</div>
        </div>
    </div>
</div>

<script>
    let priceHistory = [];

    async function fetchData() {
        try {
            // Precio y Stats
            const pRes = await fetch('https://api.coingecko.com/api/v3/simple/price?ids=bitcoin&vs_currencies=usd&include_24hr_vol=false&include_24hr_change=true&include_market_cap=true');
            const pData = await pRes.json();
            
            // Historial para el gráfico
            const cRes = await fetch('https://api.coingecko.com/api/v3/coins/bitcoin/market_chart?vs_currency=usd&days=1&interval=hourly');
            const cData = await cRes.json();
            
            const btc = pData.bitcoin;
            document.getElementById('btcPrice').innerText = '$' + btc.usd.toLocaleString(undefined, {minimumFractionDigits: 2});
            
            const change = btc.usd_24h_change;
            const chEl = document.getElementById('priceChange');
            chEl.innerText = (change >= 0 ? '+' : '') + change.toFixed(2) + '%';
            chEl.className = 'price-badge ' + (change >= 0 ? 'badge-up' : 'badge-dn');
            
            document.getElementById('mktCap').innerText = '$' + (btc.usd_market_cap / 1e12).toFixed(2) + 'T';
            
            priceHistory = cData.prices.map(p => p[1]);
            
            // Actualizar High/Low basados en las últimas 24h del chart
            document.getElementById('high24').innerText = '$' + Math.max(...priceHistory).toLocaleString(undefined, {maximumFractionDigits:0});
            document.getElementById('low24').innerText = '$' + Math.min(...priceHistory).toLocaleString(undefined, {maximumFractionDigits:0});
            
            drawChart();
            document.getElementById('lastUpdate').innerText = new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
        } catch(e) { console.error("Error Fetching Price:", e); }
    }

    function drawChart() {
        const canvas = document.getElementById('priceChart');
        const ctx = canvas.getContext('2d');
        const container = document.getElementById('chartWrap');
        
        // Ajuste de resolución para pantallas de alta densidad (S24 Ultra)
        const dpr = window.devicePixelRatio || 1;
        canvas.width = container.clientWidth * dpr;
        canvas.height = container.clientHeight * dpr;
        ctx.scale(dpr, dpr);
        
        const w = container.clientWidth;
        const h = container.clientHeight;
        const min = Math.min(...priceHistory);
        const max = Math.max(...priceHistory);
        const range = max - min;
        
        ctx.clearRect(0,0,w,h);
        
        // Dibujar línea principal
        ctx.beginPath();
        ctx.strokeStyle = '#ff9500';
        ctx.lineWidth = 3;
        ctx.lineJoin = 'round';
        
        priceHistory.forEach((p, i) => {
            const x = (i / (priceHistory.length - 1)) * w;
            const y = h - ((p - min) / range) * (h * 0.75) - (h * 0.15);
            if(i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
        });
        ctx.stroke();
        
        // Dibujar gradiente bajo la línea
        ctx.lineTo(w, h);
        ctx.lineTo(0, h);
        const grad = ctx.createLinearGradient(0, 0, 0, h);
        grad.addColorStop(0, 'rgba(255, 149, 0, 0.15)');
        grad.addColorStop(1, 'transparent');
        ctx.fillStyle = grad;
        ctx.fill();
    }

    async function fetchSentiment() {
        try {
            const res = await fetch('https://api.alternative.me/fng/?limit=1');
            const data = await res.json();
            const val = data.data[0].value;
            document.getElementById('gaugeVal').innerText = val;
            document.getElementById('gaugeLabel').innerText = data.data[0].value_classification.toUpperCase();
            document.getElementById('sentFill').style.width = val + '%';
        } catch(e) { console.error("Error Sentiment:", e); }
    }

    async function fetchNews() {
        try {
            // Usamos un proxy de noticias estable
            const res = await fetch('https://api.rss2json.com/v1/api.json?rss_url=https://cointelegraph.com/rss/tag/bitcoin');
            const data = await res.json();
            const list = document.getElementById('newsList');
            list.innerHTML = data.items.slice(0, 4).map(item => `
                <div class="news-item" onclick="window.open('${item.link}', '_blank')">
                    <div class="news-title">${item.title}</div>
                    <div class="news-src">COINTELEGRAPH • ${new Date(item.pubDate).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}</div>
                </div>
            `).join('');
        } catch(e) { console.error("Error News:", e); }
    }

    function refreshAll() {
        const btn = document.getElementById('refreshBtn');
        btn.classList.add('spinning');
        fetchData();
        fetchSentiment();
        fetchNews();
        setTimeout(() => btn.classList.remove('spinning'), 800);
    }

    // Iniciar app
    window.onload = () => {
        refreshAll();
        // Redibujar gráfico si se cambia el tamaño de la ventana (para DeX)
        window.addEventListener('resize', () => {
            if(priceHistory.length > 0) drawChart();
        });
    };
</script>
</body>
</html>
