<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>₿ BTC Quantum Dashboard</title>
<style>
/* FUENTES MODERNAS */
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Space+Grotesk:wght@400;500;700&display=swap');

:root {
    --accent: #ff9500;
    --accent-glow: rgba(255, 149, 0, 0.25);
    --bg: #030305;
    --card-bg: rgba(25, 25, 35, 0.6);
    --text-main: #ffffff;
    --text-dim: #94a3b8;
    --border: rgba(255, 255, 255, 0.08);
    --up: #00ff88;
    --down: #ff4444;
}

* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

body {
    width: 100%;
    min-height: 100vh;
    background-color: var(--bg);
    background-image: 
        radial-gradient(circle at 0% 0%, rgba(255, 149, 0, 0.08) 0%, transparent 40%),
        radial-gradient(circle at 100% 100%, rgba(0, 102, 255, 0.05) 0%, transparent 40%);
    color: var(--text-main);
    font-family: 'Inter', sans-serif;
    overflow-x: hidden;
}

#app {
    max-width: 480px;
    margin: 0 auto;
    padding: 15px;
    display: flex;
    flex-direction: column;
    gap: 18px;
    padding-bottom: 50px;
}

/* HEADER */
.header { text-align: left; padding: 25px 0 5px; }
.logo { 
    font-family: 'Space Grotesk', sans-serif; 
    font-size: 28px; 
    font-weight: 700; 
    letter-spacing: -1px;
    display: flex;
    align-items: center;
    gap: 10px;
}
.logo span { color: var(--accent); text-shadow: 0 0 20px var(--accent-glow); }
.logo-sub { font-size: 10px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 3px; margin-top: 4px; font-weight: 600; }

/* CARDS GLASSMORPHISM */
.card {
    background: var(--card-bg);
    backdrop-filter: blur(15px);
    -webkit-backdrop-filter: blur(15px);
    border: 1px solid var(--border);
    border-radius: 28px;
    padding: 24px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.3);
}

.card-lbl {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 11px;
    font-weight: 600;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 2px;
    margin-bottom: 15px;
    display: flex;
    justify-content: space-between;
}

/* SECCIÓN PRECIO */
.price-val {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 44px;
    font-weight: 700;
    letter-spacing: -2px;
    margin-bottom: 8px;
    color: #fff;
}
.price-badge {
    display: inline-flex;
    padding: 5px 14px;
    border-radius: 100px;
    font-size: 13px;
    font-weight: 700;
}
.badge-up { background: rgba(0, 255, 136, 0.1); color: var(--up); border: 1px solid rgba(0, 255, 136, 0.2); }
.badge-dn { background: rgba(255, 68, 68, 0.1); color: var(--down); border: 1px solid rgba(255, 68, 68, 0.2); }

.price-stats {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    margin: 25px 0;
}
.pstat { background: rgba(0,0,0,0.2); padding: 10px; border-radius: 16px; border: 1px solid rgba(255,255,255,0.03); }
.pstat-val { font-size: 12px; font-weight: 700; color: #f1f5f9; font-family: 'Space Grotesk'; }
.pstat-lbl { font-size: 9px; color: var(--text-dim); margin-top: 3px; font-weight: 500; }

/* GRÁFICO */
#chartWrap { height: 110px; width: 100%; margin-top: 10px; }
#priceChart { width: 100%; height: 100%; }

/* SENTIMIENTO */
.sent-val { font-family: 'Space Grotesk'; font-size: 52px; font-weight: 700; margin-bottom: 5px; }
.sent-bar-bg { height: 6px; background: rgba(255,255,255,0.05); border-radius: 10px; margin: 15px 0; position: relative; overflow: hidden; }
#sentFill { position: absolute; height: 100%; width: 0%; background: var(--accent); transition: width 1s ease; box-shadow: 0 0 10px var(--accent); }

/* NOTICIAS */
.news-item { padding: 18px 0; border-bottom: 1px solid rgba(255,255,255,0.05); cursor: pointer; }
.news-item:last-child { border-bottom: none; }
.news-title { font-family: 'Space Grotesk', sans-serif; font-size: 15px; font-weight: 500; line-height: 1.4; color: #e2e8f0; margin-bottom: 6px; transition: color 0.2s; }
.news-item:hover .news-title { color: var(--accent); }
.news-meta { font-size: 10px; color: var(--text-dim); display: flex; align-items: center; gap: 8px; font-weight: 600; }
.news-src { color: var(--accent); background: rgba(255, 149, 0, 0.1); padding: 2px 8px; border-radius: 5px; }

/* REFRESH BTN */
.refresh-btn {
    position: fixed; bottom: 25px; right: 25px; width: 56px; height: 56px; border-radius: 20px;
    background: var(--accent); color: #000; border: none; font-size: 24px; cursor: pointer;
    box-shadow: 0 10px 25px rgba(255, 149, 0, 0.4); z-index: 100; transition: transform 0.2s;
}
.refresh-btn:active { transform: scale(0.9); }
.spinning { animation: spin 0.6s linear; }
@keyframes spin { 100% { transform: rotate(360deg); } }

/* TOAST */
#toast { position: fixed; top: 30px; left: 50%; transform: translateX(-50%); background: #fff; color: #000; padding: 10px 20px; border-radius: 50px; font-size: 12px; font-weight: 700; opacity: 0; transition: 0.3s; z-index: 1000; }
#toast.show { opacity: 1; top: 40px; }
</style>
</head>
<body>

<div id="toast">Cargando datos...</div>
<button class="refresh-btn" id="refreshBtn" onclick="refreshAll()">⚡</button>

<div id="app">
  <header class="header">
    <div class="logo"><span>₿</span> BTC QUANTUM</div>
    <div class="logo-sub">Intelligence Ecosystem</div>
  </header>

  <div class="card">
    <div class="card-lbl">Spot Price <span id="lastUpdate" style="color:var(--accent)">--:--</span></div>
    <div class="price-val" id="btcPrice">$ --,---.--</div>
    <div class="price-badge" id="priceChange">--%</div>
    
    <div class="price-stats">
      <div class="pstat"><div class="pstat-val" id="high24">--</div><div class="pstat-lbl">24H High</div></div>
      <div class="pstat"><div class="pstat-val" id="low24">--</div><div class="pstat-lbl">24H Low</div></div>
      <div class="pstat"><div class="pstat-val" id="mktCap">--</div><div class="pstat-lbl">Market Cap</div></div>
    </div>
    <div id="chartWrap"><canvas id="priceChart"></canvas></div>
  </div>

  <div class="card" style="text-align:center">
    <div class="card-lbl">Market Sentiment</div>
    <div class="sent-val" id="gaugeVal">--</div>
    <div id="gaugeLabel" style="font-size:12px; letter-spacing:3px; font-weight:700; text-transform:uppercase; color:var(--accent)">ANALYZING...</div>
    <div class="sent-bar-bg"><div id="sentFill"></div></div>
    <div id="gaugeDesc" style="font-size:11px; color:var(--text-dim); line-height:1.5">Calculating fear and greed index based on volatility and social volume.</div>
  </div>

  <div class="card">
    <div class="card-lbl">Live Intelligence</div>
    <div id="newsList">
        <div style="padding:20px; text-align:center; color:var(--text-dim)">Fetching news...</div>
    </div>
  </div>
</div>

<script>
let priceHistory = [];

async function fetchPrice() {
    try {
        const [pRes, cRes] = await Promise.all([
            fetch('https://api.coingecko.com/api/v3/coins/bitcoin?localization=false&tickers=false&community_data=false&developer_data=false'),
            fetch('https://api.coingecko.com/api/v3/coins/bitcoin/market_chart?vs_currency=usd&days=1&interval=hourly')
        ]);
        const coin = await pRes.json();
        const chart = await cRes.json();
        
        const price = coin.market_data.current_price.usd;
        const change = coin.market_data.price_change_percentage_24h;
        
        document.getElementById('btcPrice').innerText = '$' + price.toLocaleString('en-US', {minimumFractionDigits:2});
        const chEl = document.getElementById('priceChange');
        chEl.innerText = (change >= 0 ? '+' : '') + change.toFixed(2) + '%';
        chEl.className = 'price-badge ' + (change >= 0 ? 'badge-up' : 'badge-dn');
        
        document.getElementById('high24').innerText = '$' + coin.market_data.high_24h.usd.toLocaleString();
        document.getElementById('low24').innerText = '$' + coin.market_data.low_24h.usd.toLocaleString();
        document.getElementById('mktCap').innerText = '$' + (coin.market_data.market_cap.usd / 1e12).toFixed(2) + 'T';
        
        priceHistory = chart.prices.map(p => p[1]);
        drawChart();
        document.getElementById('lastUpdate').innerText = new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
    } catch(e) { console.error(e); }
}

function drawChart() {
    const canvas = document.getElementById('priceChart');
    const ctx = canvas.getContext('2d');
    const w = canvas.parentElement.clientWidth;
    const h = canvas.parentElement.clientHeight;
    canvas.width = w * window.devicePixelRatio;
    canvas.height = h * window.devicePixelRatio;
    ctx.scale(window.devicePixelRatio, window.devicePixelRatio);
    
    const min = Math.min(...priceHistory);
    const max = Math.max(...priceHistory);
    const range = max - min;
    
    ctx.beginPath();
    ctx.strokeStyle = '#ff9500';
    ctx.lineWidth = 3;
    ctx.lineJoin = 'round';
    
    priceHistory.forEach((p, i) => {
        const x = (i / (priceHistory.length - 1)) * w;
        const y = h - ((p - min) / range) * h * 0.8 - (h * 0.1);
        if(i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
    });
    ctx.stroke();
}

async function fetchSentiment() {
    try {
        const res = await fetch('https://api.alternative.me/fng/?limit=1');
        const data = await res.json();
        const val = data.data[0].value;
        document.getElementById('gaugeVal').innerText = val;
        document.getElementById('gaugeLabel').innerText = data.data[0].value_classification;
        document.getElementById('sentFill').style.width = val + '%';
    } catch(e) {}
}

async function fetchNews() {
    try {
        const res = await fetch('https://api.rss2json.com/v1/api.json?rss_url=https://www.coindesk.com/arc/outboundfeeds/rss/&api_key=public');
        const data = await res.json();
        const list = document.getElementById('newsList');
        list.innerHTML = data.items.slice(0, 5).map(item => `
            <div class="news-item" onclick="window.open('${item.link}', '_blank')">
                <div class="news-title">${item.title}</div>
                <div class="news-meta">
                    <span class="news-src">CoinDesk</span>
                    <span>${new Date(item.pubDate).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}</span>
                </div>
            </div>
        `).join('');
    } catch(e) {}
}

function refreshAll() {
    const btn = document.getElementById('refreshBtn');
    btn.classList.add('spinning');
    fetchPrice(); fetchSentiment(); fetchNews();
    const toast = document.getElementById('toast');
    toast.innerText = "Sincronizando con la red...";
    toast.classList.add('show');
    setTimeout(() => { 
        btn.classList.remove('spinning'); 
        toast.classList.remove('show');
    }, 1500);
}

window.onload = () => {
    fetchPrice(); fetchSentiment(); fetchNews();
    setInterval(fetchPrice, 60000);
};
</script>
</body>
</html>
